services:
  postgres:
    image: postgres:16-alpine
    container_name: ops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    image: ops-api:local
    container_name: ops-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PORT: "3000"
      APP_VERSION: ${APP_VERSION:-dev}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  bot:
    profiles: ["bot"]
    build:
      context: ../bot
      dockerfile: Dockerfile
    image: ops-bot:local
    container_name: ops-bot
    restart: unless-stopped
    environment:
      TG_BOT_TOKEN: ${TG_BOT_TOKEN:-}
      OPS_API_URL: http://api:3000
      OPS_BOT_TOKEN: ${OPS_BOT_TOKEN}
      TASK_BOT_POLL_INTERVAL_MS: ${TASK_BOT_POLL_INTERVAL_MS:-15000}
      TELEGRAM_PROXY_URL: ${TELEGRAM_PROXY_URL:-}
      TELEGRAM_REQUEST_FAMILY: ${TELEGRAM_REQUEST_FAMILY:-4}
      TELEGRAM_REQUEST_TIMEOUT_MS: ${TELEGRAM_REQUEST_TIMEOUT_MS:-45000}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - internal

  caddy:
    image: caddy:2.8-alpine
    container_name: ops-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../web/dist:/srv/web:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - api
    networks:
      - internal

volumes:
  postgres-data:
  caddy-data:
  caddy-config:

networks:
  internal:
    driver: bridge
