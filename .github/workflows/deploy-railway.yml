name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-railway-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "Missing GitHub secret: RAILWAY_TOKEN"
            exit 1
          fi
          if [ -z "$RAILWAY_SERVICE_ID" ]; then
            echo "Missing GitHub secret: RAILWAY_SERVICE_ID"
            exit 1
          fi

          npm i -g @railway/cli

          if [ -n "$RAILWAY_ENVIRONMENT_ID" ]; then
            railway up --service "$RAILWAY_SERVICE_ID" --environment "$RAILWAY_ENVIRONMENT_ID" --ci
          else
            railway up --service "$RAILWAY_SERVICE_ID" --ci
          fi
