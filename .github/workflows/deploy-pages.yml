name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Syntax check JS
        run: |
          set -euo pipefail
          for f in js/*.js corporate-gift/*.js; do
            node --check "$f"
          done
          node --check bot/timebot.js
          node --check bot/task-notification-core.js
          node tests/version-smoke.js
          node tests/work-management-smoke.js
          node tests/tasks-smoke.js
          node tests/task-notification-smoke.js
          node tests/bug-reports-smoke.js
          node tests/order-flow-smoke.js
          node tests/marketplaces-smoke.js
          node tests/molds-smoke.js
          node tests/molds-price-recovery-smoke.js
          node tests/legacy-host-blocker-smoke.js
          node tests/wiki-smoke.js
          node tests/auth-hardening-smoke.js
          node tests/employee-auth-payroll-smoke.js
          node tests/payroll-half-month-smoke.js
          node tests/production-calendar-smoke.js
          node tests/factual-smoke.js
          node tests/supabase-fallback-smoke.js
          node --check tests/live-site-smoke.mjs
          node --check tests/yandex-mirror-smoke.mjs
          node --check tests/warehouse-stress-smoke.mjs
          node --check .github/scripts/send-telegram-alert.mjs
          node --check .github/scripts/sync-smoke-issue.mjs

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-vercel:
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://calc.recycleobject.ru/
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Deploy to calc.recycleobject.ru
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "VERCEL_TOKEN secret is required to deploy calc.recycleobject.ru" >&2
            exit 1
          fi
          if [ -z "${VERCEL_ORG_ID:-}" ] || [ -z "${VERCEL_PROJECT_ID:-}" ]; then
            echo "VERCEL_ORG_ID and VERCEL_PROJECT_ID secrets are required to deploy calc.recycleobject.ru" >&2
            exit 1
          fi
          npx vercel@51.6.1 deploy --prod --yes --token "$VERCEL_TOKEN"
