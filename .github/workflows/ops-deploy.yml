name: Deploy ops stack

on:
  pull_request:
    branches: [main]
    paths:
      - 'ops/**'
      - '.github/workflows/ops-deploy.yml'
  push:
    branches: [main]
    paths:
      - 'ops/**'
      - '.github/workflows/ops-deploy.yml'

concurrency:
  group: ops-deploy
  cancel-in-progress: false

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ops
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: ops
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            ops/api/package-lock.json
            ops/web/package-lock.json

      - name: Install API deps
        run: |
          cd ops/api
          npm ci

      - name: Apply migrations
        env:
          DATABASE_URL: postgres://ops:ci_password@localhost:5432/ops
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          bash ops/db/migrate.sh

      - name: Run API tests
        env:
          TEST_DATABASE_URL: postgres://ops:ci_password@localhost:5432/ops
        run: |
          cd ops/api
          npm test

      - name: Install Web deps and build
        run: |
          cd ops/web
          npm ci
          npm run build

      - name: Set up SSH
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.OPS_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync to VPS
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --exclude='node_modules' \
            --exclude='.env' \
            ops/ ${{ secrets.OPS_USER }}@${{ secrets.OPS_HOST }}:/srv/ops/

      - name: Deploy on VPS
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.OPS_USER }}@${{ secrets.OPS_HOST }} bash <<'REMOTE'
            set -euo pipefail
            cd /srv/ops/infra
            docker compose --env-file .env up -d --build
            for f in /srv/ops/db/migrations/*.sql; do
              docker cp "$f" ops-postgres:/tmp/migration.sql
              docker exec ops-postgres psql -U ops -d ops -v ON_ERROR_STOP=1 -f /tmp/migration.sql
            done
          REMOTE

      - name: Health check
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          sleep 15
          for i in 1 2 3 4 5; do
            if curl -sSf "https://ops-staging.recycleobject.ru/api/health" > /dev/null; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 5
          done
          echo "Health check failed after retries"
          curl -sS "https://ops-staging.recycleobject.ru/api/health" || true
          exit 1
