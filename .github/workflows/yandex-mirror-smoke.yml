name: Yandex mirror smoke

on:
  workflow_dispatch:
    inputs:
      live_url:
        description: 'Yandex mirror URL to smoke-test. Defaults to calc2.recycleobject.ru.'
        required: false
        type: string
  schedule:
    - cron: '11 */2 * * *'
  workflow_run:
    workflows:
      - Yandex static mirror sync
    types:
      - completed

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    container:
      image: mcr.microsoft.com/playwright:v1.54.2-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Playwright package
        run: npm install --no-save playwright@1.54.2

      - name: Run Yandex mirror smoke
        env:
          RO_YANDEX_URL: ${{ inputs.live_url || 'https://calc2.recycleobject.ru/' }}
          RO_SMOKE_USER_ID: 1772715209137
        run: node tests/yandex-mirror-smoke.mjs

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yandex-mirror-smoke-artifacts
          path: output/playwright/yandex-mirror-smoke
          if-no-files-found: ignore

      - name: Notify Telegram
        if: ${{ always() }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TASK_BOT_TOKEN: ${{ secrets.TASK_BOT_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          TELEGRAM_SMOKE_CHAT_ID: ${{ secrets.TELEGRAM_SMOKE_CHAT_ID }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_WORKFLOW: Yandex mirror smoke
          ALERT_SCOPE: calc2 Russia fallback without Supabase
          ALERT_STATUS: ${{ job.status }}
          ALERT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ALERT_SOURCE_WORKFLOW: ${{ github.event.workflow_run.name }}
        run: node .github/scripts/send-telegram-alert.mjs

      - name: Sync GitHub issue
        if: ${{ always() }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ALERT_WORKFLOW: Yandex mirror smoke
          ALERT_SCOPE: calc2 Russia fallback without Supabase
          ALERT_STATUS: ${{ job.status }}
          ALERT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ALERT_SOURCE_WORKFLOW: ${{ github.event.workflow_run.name }}
        run: node .github/scripts/sync-smoke-issue.mjs
