name: Warehouse stress smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '41 */4 * * *'
  workflow_run:
    workflows: ['Deploy GitHub Pages']
    types: [completed]

permissions:
  contents: read

jobs:
  stress:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run warehouse stress smoke
        env:
          RO_STRESS_ITERATIONS: '5'
        run: node tests/warehouse-stress-smoke.mjs

      - name: Notify Telegram on failure
        if: ${{ failure() && (secrets.TELEGRAM_BOT_TOKEN != '' || secrets.TASK_BOT_TOKEN != '' || secrets.BOT_TOKEN != '') && (secrets.TELEGRAM_ALERT_CHAT_ID != '' || secrets.TELEGRAM_SMOKE_CHAT_ID != '' || secrets.TELEGRAM_CHAT_ID != '') }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TASK_BOT_TOKEN: ${{ secrets.TASK_BOT_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          TELEGRAM_SMOKE_CHAT_ID: ${{ secrets.TELEGRAM_SMOKE_CHAT_ID }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_WORKFLOW: Warehouse stress smoke
          ALERT_SCOPE: warehouse reservations + pendant + clone + fallback stress
          ALERT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ALERT_SOURCE_WORKFLOW: ${{ github.event.workflow_run.name }}
        run: node .github/scripts/send-telegram-alert.mjs
