name: Live site smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */4 * * *'
  workflow_run:
    workflows:
      - Deploy GitHub Pages
    types:
      - completed

permissions:
  contents: read

jobs:
  smoke:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Playwright
        run: |
          set -euo pipefail
          npm install --no-save playwright@1.54.2
          npx playwright install --with-deps chromium

      - name: Run live smoke
        env:
          RO_LIVE_URL: https://polinacherpovitskaya-glitch.github.io/ro-calculator/
          RO_SMOKE_USER_ID: 1772715209137
        run: node tests/live-site-smoke.mjs

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-site-smoke-artifacts
          path: output/playwright/live-site-smoke
          if-no-files-found: ignore

      - name: Notify Telegram on failure
        if: ${{ failure() && (secrets.TELEGRAM_BOT_TOKEN != '' || secrets.TASK_BOT_TOKEN != '' || secrets.BOT_TOKEN != '') && (secrets.TELEGRAM_ALERT_CHAT_ID != '' || secrets.TELEGRAM_SMOKE_CHAT_ID != '' || secrets.TELEGRAM_CHAT_ID != '') }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TASK_BOT_TOKEN: ${{ secrets.TASK_BOT_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          TELEGRAM_SMOKE_CHAT_ID: ${{ secrets.TELEGRAM_SMOKE_CHAT_ID }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_WORKFLOW: Live site smoke
          ALERT_SCOPE: bugs done fallback + warehouse live load
          ALERT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ALERT_SOURCE_WORKFLOW: ${{ github.event.workflow_run.name }}
        run: node .github/scripts/send-telegram-alert.mjs
