name: Live site smoke

on:
  workflow_dispatch:
    inputs:
      live_url:
        description: 'URL to smoke-test. Defaults to calc.recycleobject.ru.'
        required: false
        type: string
  schedule:
    - cron: '17 */4 * * *'
  workflow_run:
    workflows:
      - Deploy GitHub Pages
    types:
      - completed

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: mcr.microsoft.com/playwright:v1.54.2-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check deployed version before automatic smoke
        id: preflight
        shell: bash
        env:
          RO_LIVE_URL: ${{ inputs.live_url || 'https://calc.recycleobject.ru/' }}
        run: |
          set -euo pipefail
          echo "skip=false" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" != "workflow_run" ] && [ "${{ github.event_name }}" != "schedule" ]; then
            exit 0
          fi

          expected="$(node -e 'console.log(require("./js/version.json").version)')"
          version_url="$(node -e 'const base = new URL(process.env.RO_LIVE_URL || "https://calc.recycleobject.ru/"); base.pathname = base.pathname.replace(/\/?$/, "/js/version.json"); base.search = ""; base.hash = ""; console.log(base.toString())')"
          actual="$(curl -fsSL --max-time 20 "${version_url}?cb=$(date +%s)" 2>/dev/null | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{console.log(JSON.parse(d).version||"unknown")}catch{console.log("unparsable")}})' || echo "unreachable")"

          echo "Expected live version: ${expected}"
          echo "Actual live version: ${actual}"

          if [ "${actual}" != "${expected}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=Live smoke skipped::${RO_LIVE_URL} is still ${actual}, expected ${expected}. The Deploy GitHub Pages workflow already reports the stale Vercel deployment."
          fi

      - name: Install Playwright package
        if: ${{ steps.preflight.outputs.skip != 'true' }}
        run: npm install --no-save playwright@1.54.2

      - name: Run live smoke
        if: ${{ steps.preflight.outputs.skip != 'true' }}
        env:
          RO_LIVE_URL: ${{ inputs.live_url || 'https://calc.recycleobject.ru/' }}
          RO_SMOKE_USER_ID: 1772715209137
        run: node tests/live-site-smoke.mjs

      - name: Upload Playwright artifacts
        if: ${{ always() && steps.preflight.outcome == 'success' && steps.preflight.outputs.skip != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: live-site-smoke-artifacts
          path: output/playwright/live-site-smoke
          if-no-files-found: ignore

      - name: Notify Telegram
        if: ${{ always() && steps.preflight.outcome == 'success' && steps.preflight.outputs.skip != 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TASK_BOT_TOKEN: ${{ secrets.TASK_BOT_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          TELEGRAM_SMOKE_CHAT_ID: ${{ secrets.TELEGRAM_SMOKE_CHAT_ID }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_WORKFLOW: Live site smoke
          ALERT_SCOPE: bugs done fallback + warehouse live load + monitoring dashboard
          ALERT_STATUS: ${{ job.status }}
          ALERT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ALERT_SOURCE_WORKFLOW: ${{ github.event.workflow_run.name }}
        run: node .github/scripts/send-telegram-alert.mjs

      - name: Sync GitHub issue
        if: ${{ always() && steps.preflight.outcome == 'success' && steps.preflight.outputs.skip != 'true' }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ALERT_WORKFLOW: Live site smoke
          ALERT_SCOPE: bugs done fallback + warehouse live load + monitoring dashboard
          ALERT_STATUS: ${{ job.status }}
          ALERT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ALERT_SOURCE_WORKFLOW: ${{ github.event.workflow_run.name }}
        run: node .github/scripts/sync-smoke-issue.mjs
