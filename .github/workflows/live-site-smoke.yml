name: Live site smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */4 * * *'
  workflow_run:
    workflows:
      - Deploy GitHub Pages
    types:
      - completed

permissions:
  contents: read
  issues: write

jobs:
  smoke:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: mcr.microsoft.com/playwright:v1.54.2-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Playwright package
        run: npm install --no-save playwright@1.54.2

      - name: Run live smoke
        env:
          RO_LIVE_URL: https://calc.recycleobject.ru/
          RO_SMOKE_USER_ID: 1772715209137
        run: node tests/live-site-smoke.mjs

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-site-smoke-artifacts
          path: output/playwright/live-site-smoke
          if-no-files-found: ignore

      - name: Notify Telegram
        if: ${{ always() }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TASK_BOT_TOKEN: ${{ secrets.TASK_BOT_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          TELEGRAM_SMOKE_CHAT_ID: ${{ secrets.TELEGRAM_SMOKE_CHAT_ID }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_WORKFLOW: Live site smoke
          ALERT_SCOPE: bugs done fallback + warehouse live load + monitoring dashboard
          ALERT_STATUS: ${{ job.status }}
          ALERT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ALERT_SOURCE_WORKFLOW: ${{ github.event.workflow_run.name }}
        run: node .github/scripts/send-telegram-alert.mjs

      - name: Sync GitHub issue
        if: ${{ always() }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ALERT_WORKFLOW: Live site smoke
          ALERT_SCOPE: bugs done fallback + warehouse live load + monitoring dashboard
          ALERT_STATUS: ${{ job.status }}
          ALERT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ALERT_SOURCE_WORKFLOW: ${{ github.event.workflow_run.name }}
        run: node .github/scripts/sync-smoke-issue.mjs
